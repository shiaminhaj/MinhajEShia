<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Minhaj e Shia…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --obsidian: #060D14;
      --teal: #00838F;
      --gold: #C9A84C;
      --muted: rgba(255,255,255,0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--obsidian);
      color: #fff;
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo-ring {
      width: 80px;
      height: 80px;
      border: 2px solid rgba(201, 168, 76, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(0, 131, 143, 0.4);
      border-radius: 50%;
    }

    .logo-arabic {
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      color: var(--gold);
      line-height: 1;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.15); }
      50% { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    p {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(0,131,143,0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 2.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .store-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .store-links.visible { opacity: 1; }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, background 0.2s;
    }

    .store-btn:hover {
      border-color: var(--teal);
      background: rgba(0,131,143,0.08);
    }

    .store-btn svg { opacity: 0.85; }

    .status-msg {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2rem;
    }

    .status-msg span {
      color: var(--teal);
    }
  </style>
  <!-- Amiri for the Arabic logo glyph -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo-ring">
    <span class="logo-arabic">م</span>
  </div>

  <h1>Opening Minhaj e Shia</h1>
  <p>Launching the app on your device…<br>If it doesn't open, download it below.</p>

  <div class="spinner" id="spinner"></div>

  <div class="store-links" id="storeLinks">
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.minhajeshia" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.36.2.77.24 1.17.12l12.1-6.98-2.55-2.55L3.18 23.76zM20.53 9.6L17.7 8l-3.07 3.07 3.07 3.07 2.85-1.64c.81-.47.81-1.64-.02-2.1zM2.13 1.27C2.05 1.5 2 1.75 2 2.04v19.92c0 .29.05.54.13.77l.07.07L13.43 11.6v-.2L2.2 1.2l-.07.07zM14.44 7.53l-1.01-.58-11.3-6.52 10.72 10.72 1.59-3.62z"/></svg>
      Google Play
    </a>
    <a class="store-btn" href="https://apps.apple.com/app/minhaj-e-shia/id0000000000" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98l-.09.06c-.22.15-2.18 1.27-2.16 3.8.03 3.02 2.65 4.03 2.68 4.04l-.07.24zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store
    </a>
    <a class="store-btn" href="https://github.com/shiaminhaj/MinhajEShia/releases/latest" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      Windows
    </a>
  </div>

  <p class="status-msg" id="statusMsg">
    Redirecting… <span id="countdown">2</span>s
  </p>

  <script>
    // Build the deep-link URI from query params and forward to the app
    const params = new URLSearchParams(window.location.search);
    const path = params.get('path') || '';
    const deepLink = 'minhajeshia://' + path;

    // Attempt to open the app
    window.location.href = deepLink;

    // Countdown and reveal store buttons
    let seconds = 2;
    const cd = document.getElementById('countdown');
    const storeLinks = document.getElementById('storeLinks');
    const statusMsg = document.getElementById('statusMsg');
    const spinner = document.getElementById('spinner');

    const timer = setInterval(() => {
      seconds--;
      if (cd) cd.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        spinner.style.display = 'none';
        storeLinks.classList.add('visible');
        statusMsg.textContent = "App not installed? Get it on your platform:";
        statusMsg.style.color = 'rgba(255,255,255,0.55)';
      }
    }, 1000);
  </script>
</body>
</html>
