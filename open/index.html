<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Minhaj e Shia…</title>
  <meta name="theme-color" content="#0D1620">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500&family=Amiri&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --scaffold:     #0D1620;
      --surface:      #14202C;
      --teal:         #00838F;
      --teal-dark:    #4DD0E1;
      --teal-soft:    rgba(0,131,143,0.10);
      --gold:         #D4A574;
      --gold-bright:  #C9A84C;
      --border:       #2A3640;
      --muted:        #7A8A98;
      --on-surface:   #E6E1E5;
      --text-dim:     rgba(230,225,229,0.32);
    }

    body {
      background: var(--scaffold);
      color: var(--on-surface);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      pointer-events: none; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='512' height='512' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    .logo-ring {
      width: 80px; height: 80px;
      border: 1px solid rgba(212,165,116,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      position: relative;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: 7px;
      border: 1px solid rgba(0,131,143,0.3);
      border-radius: 50%;
    }
    .logo-ar {
      font-family: 'Amiri', serif;
      font-size: 28px; color: var(--gold);
      line-height: 1;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,165,116,0.1); }
      50% { box-shadow: 0 0 0 14px rgba(212,165,116,0); }
    }

    h1 {
      font-size: 20px; font-weight: 400;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px; font-weight: 300;
      color: var(--muted); line-height: 1.7;
      margin-bottom: 36px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(0,131,143,0.15);
      border-top-color: var(--teal-dark);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 36px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stores {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .stores.visible { opacity: 1; }

    .store-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--on-surface);
      text-decoration: none;
      font-size: 13px; font-weight: 400;
      letter-spacing: 0.03em;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }
    .store-btn:hover {
      border-color: var(--teal);
      background: rgba(0,131,143,0.06);
      transform: translateY(-1px);
    }
    .store-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .status {
      font-size: 12px; color: var(--muted);
      margin-top: 28px; letter-spacing: 0.03em;
    }
    .status span { color: var(--teal-dark); }

    @media (max-width: 480px) {
      .stores { flex-direction: column; align-items: center; }
      .store-btn { width: 100%; max-width: 260px; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="logo-ring">
    <span class="logo-ar">م</span>
  </div>

  <h1>Opening Minhaj e Shia</h1>
  <p class="subtitle">Launching the app on your device…<br>If it doesn't open, download it below.</p>

  <div class="spinner" id="spinner"></div>

  <div class="stores" id="stores">
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.minhajeshia" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 20.5V3.5c0-.85.45-1.57 1.1-1.96L14.58 12 4.1 22.46A2.18 2.18 0 013 20.5z" fill="#4DD0E1"/>
        <path d="M17.73 14.17L6.27 20.78l9.46-9.46 2 2.85z" fill="#00838F"/>
        <path d="M20.66 11.12l-2.93-1.68-2.15 2.15 2.15 2.15 2.93-1.68c.56-.32.56-1.22 0-1.54v.6z" fill="#7A8A98"/>
        <path d="M6.27 3.22l11.46 6.61-2 2.85-9.46-9.46z" fill="#D4A574"/>
      </svg>
      Google Play
    </a>
    <a class="store-btn" href="https://apps.apple.com/app/minhaj-e-shia/id0000000000" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="var(--on-surface)">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.37 2.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      App Store
    </a>
    <a class="store-btn" href="https://github.com/shiaminhaj/MinhajEShia/releases/latest" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="var(--on-surface)">
        <path d="M3 12V6.75L9.75 5.87V12H3zM9.75 13.12V19.13L3 18.25V13.12H9.75zM10.88 5.72L21 4V12H10.88V5.72zM21 13.12V21L10.88 19.28V13.12H21z"/>
      </svg>
      Windows
    </a>
  </div>

  <p class="status" id="status">
    Redirecting… <span id="cd">2</span>s
  </p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const path = params.get('path') || '';
    window.location.href = 'minhajeshia://' + path;

    let sec = 2;
    const cd = document.getElementById('cd');
    const stores = document.getElementById('stores');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');

    const t = setInterval(() => {
      sec--;
      if (cd) cd.textContent = sec;
      if (sec <= 0) {
        clearInterval(t);
        spinner.style.display = 'none';
        stores.classList.add('visible');
        status.textContent = 'App not installed? Get it below:';
      }
    }, 1000);
  </script>
</body>
</html>
