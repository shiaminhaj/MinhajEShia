<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Minhaj e Shia…</title>
  <meta name="theme-color" content="#F9F8F4">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500&family=DM+Sans:wght@400&family=Amiri&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ivory:    #F9F8F4;
      --surface:  #FDFCFA;
      --border:   #E8E2DA;
      --text:     #1C1B1F;
      --muted:    #78818C;
      --teal:     #00838F;
      --gold:     #BF8A4A;
    }

    body {
      background: var(--ivory);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .logo-ring {
      width: 72px; height: 72px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: 7px;
      border: 1px solid rgba(0,131,143,0.2);
      border-radius: 50%;
    }
    .logo-ar {
      font-family: 'Amiri', serif;
      font-size: 26px; color: var(--gold); line-height: 1;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,131,143,0.06); }
      50% { box-shadow: 0 0 0 12px rgba(0,131,143,0); }
    }

    h1 {
      font-size: 18px; font-weight: 400;
      margin-bottom: 6px;
    }
    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      color: var(--muted); line-height: 1.7;
      margin-bottom: 32px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(0,131,143,0.1);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stores {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .stores.visible { opacity: 1; }

    .store-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      transition: border-color 0.2s, transform 0.15s;
    }
    .store-btn:hover {
      border-color: var(--teal);
      transform: translateY(-1px);
    }
    .store-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .status {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--muted);
      margin-top: 24px;
    }
    .status span { color: var(--teal); }

    @media (max-width: 480px) {
      .stores { flex-direction: column; align-items: center; }
      .store-btn { width: 100%; max-width: 240px; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="logo-ring">
    <span class="logo-ar">م</span>
  </div>

  <h1>Opening Minhaj e Shia</h1>
  <p class="subtitle">Launching the app on your device…<br>If it doesn't open, download it below.</p>

  <div class="spinner" id="spinner"></div>

  <div class="stores" id="stores">
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.minhajeshia" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 20.5V3.5c0-.85.45-1.57 1.1-1.96L14.58 12 4.1 22.46A2.18 2.18 0 013 20.5z" fill="#00838F" opacity=".6"/><path d="M17.73 14.17L6.27 20.78l9.46-9.46 2 2.85z" fill="#00838F" opacity=".4"/><path d="M20.66 11.12l-2.93-1.68-2.15 2.15 2.15 2.15 2.93-1.68c.56-.32.56-1.22 0-1.54v.6z" fill="#78818C" opacity=".4"/><path d="M6.27 3.22l11.46 6.61-2 2.85-9.46-9.46z" fill="#BF8A4A" opacity=".5"/></svg>
      Google Play
    </a>
    <a class="store-btn" href="https://apps.apple.com/app/minhaj-e-shia/id0000000000" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="#1C1B1F"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.37 2.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store
    </a>
    <a class="store-btn" href="https://github.com/shiaminhaj/MinhajEShia/releases/latest" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="#1C1B1F"><path d="M3 12V6.75L9.75 5.87V12H3zM9.75 13.12V19.13L3 18.25V13.12H9.75zM10.88 5.72L21 4V12H10.88V5.72zM21 13.12V21L10.88 19.28V13.12H21z"/></svg>
      Windows
    </a>
  </div>

  <p class="status" id="status">Redirecting… <span id="cd">2</span>s</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    window.location.href = 'minhajeshia://' + (params.get('path') || '');

    let sec = 2;
    const cd = document.getElementById('cd');
    const stores = document.getElementById('stores');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');

    const t = setInterval(() => {
      if (--sec <= 0) {
        clearInterval(t);
        spinner.style.display = 'none';
        stores.classList.add('visible');
        status.textContent = 'App not installed? Get it below:';
      } else if (cd) cd.textContent = sec;
    }, 1000);
  </script>
</body>
</html>
